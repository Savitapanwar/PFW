name: E2E Tests - Amazon Product Search

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4.1.7
      
      - name: 📦 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4.0.3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: 📚 Install dependencies
        run: npm ci
      
      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: ✅ Run Playwright tests
        run: npm test
        continue-on-error: true
      
      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4.4.0
        with:
          name: playwright-report-node-${{ matrix.node-version }}
          path: playwright-report/
          retention-days: 30
      
      - name: 📈 Upload coverage
        if: always()
        uses: actions/upload-artifact@v4.4.0
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: test-results/
          retention-days: 7
      
      - name: 🔗 Comment PR with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Playwright tests executed. Check artifacts for detailed reports.'
            })

  report:
    name: Publish Test Report
    runs-on: ubuntu-latest
    needs: test
    if: always()
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
      
      - name: 📊 Download reports
        uses: actions/download-artifact@v4.1.8
        with:
          path: all-reports
      
      - name: 📝 Generate summary
        run: |
          echo "## 🎭 Playwright E2E Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Test execution completed on $(date)" >> $GITHUB_STEP_SUMMARY
          echo "Reports available in artifacts" >> $GITHUB_STEP_SUMMARY
